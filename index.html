<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NOTMINE4REAL - Gaming Community</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <!-- Header -->
    <header>
        <div class="header-container">
            <a href="#" class="logo" data-nav="home">🎮 NOTMINE4REAL</a>
            
            <nav class="nav-links">
                <a href="#" data-nav="home">Home</a>
                <a href="#" data-nav="profiles">Players</a>
                <a href="#" data-nav="shop">Shop</a>
                <a href="#" data-nav="settings">Settings</a>
                <button data-nav="admin" style="margin-left: 1rem;">Owner Menu</button>
            </nav>

            <div class="user-info">
                <div class="avatar" id="user-avatar">U</div>
                <span id="current-user">Loading...</span>
                <span class="rank-badge" id="user-rank">MEMBER</span>
            </div>
        </div>
    </header>

    <!-- Main Content -->
    <main id="app-main" class="container"></main>

    <!-- Profile Modal -->
    <div id="profile-modal" class="modal">
        <div class="modal-content"></div>
    </div>

    <!-- Scripts -->
    <script src="app.js"></script>
    <script>
        // Update header with current user info
        function updateUserHeader() {
            const user = app.currentUser;
            document.getElementById('user-avatar').textContent = user.avatar;
            document.getElementById('current-user').textContent = user.username;
            document.getElementById('user-rank').textContent = user.rank.toUpperCase();
            document.getElementById('user-rank').className = `rank-badge rank-${user.rank}`;
        }

        // Override initApp to update header
        const originalInitApp = window.initApp;
        window.initApp = function() {
            originalInitApp();
            updateUserHeader();
        };
    </script>
</body>
</html>
